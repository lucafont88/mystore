services:
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: monitoring-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - mystore-network

  loki:
    image: grafana/loki:2.9.4
    container_name: monitoring-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - mystore-network

  promtail:
    image: grafana/promtail:2.9.4
    container_name: monitoring-promtail
    volumes:
      - ./infrastructure/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - mystore-network

  tempo:
    image: grafana/tempo:2.3.1
    container_name: monitoring-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infrastructure/monitoring/tempo/tempo-config.yml:/etc/tempo.yaml
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - mystore-network

  grafana:
    image: grafana/grafana:10.3.1
    container_name: monitoring-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/dashboards
    networks:
      - mystore-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: monitoring-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@mystore-postgres:5432/auth_db?sslmode=disable"
    depends_on:
      - postgres
    networks:
      - mystore-network

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: monitoring-redis-exporter
    command: --redis.addr=redis://mystore-redis:6379
    depends_on:
      - redis
    networks:
      - mystore-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: monitoring-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - mystore-network

volumes:
  prometheus_data:
  tempo_data:

networks:
  mystore-network:
    external: true
