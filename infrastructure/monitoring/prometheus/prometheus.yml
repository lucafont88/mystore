global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["ecommerce-otel-collector:8888"]

# Prometheus will receive metrics via remote_write from OTel Collector
# This requires --web.enable-remote-write-receiver flag in docker-compose
