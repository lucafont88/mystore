groups:
  - name: ecommerce-alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status_code=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"

      - alert: OTelCollectorDown
        expr: up{job="otel-collector"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OTel Collector is down"

      - alert: OTelCollectorQueueFilling
        expr: otelcol_exporter_queue_size > 4000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OTel Collector exporter queue is filling up"

      - alert: OTelCollectorDroppedData
        expr: rate(otelcol_processor_dropped_spans[1m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OTel Collector is dropping data"