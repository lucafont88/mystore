# ⚠️  ATTENZIONE: In produzione NON committare secrets in chiaro!
# Usa: Sealed Secrets, External Secrets Operator, o HashiCorp Vault
#
# Per generare un secret base64:
# echo -n 'your-password' | base64

apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: ecommerce
type: Opaque
stringData:
  # Database
  POSTGRES_USER: "ecommerce"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Auth Database URL
  AUTH_DATABASE_URL: "postgres://ecommerce:CHANGE_ME@postgres-auth:5432/auth_db"
  
  # Product Database URL  
  PRODUCT_DATABASE_URL: "postgres://ecommerce:CHANGE_ME@postgres-products:5432/products_db"
  
  # Order Database URL
  ORDER_DATABASE_URL: "postgres://ecommerce:CHANGE_ME@postgres-orders:5432/orders_db"
  
  # JWT Secret (genera con: openssl rand -hex 64)
  JWT_SECRET: "CHANGE_ME_USE_OPENSSL_RAND_HEX_64"
  
  # RabbitMQ
  RABBITMQ_USER: "ecommerce"
  RABBITMQ_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  RABBITMQ_URL: "amqp://ecommerce:CHANGE_ME@rabbitmq-service:5672"
  
  # Redis (se usi password)
  REDIS_PASSWORD: ""
  
  # Stripe (pagamenti)
  STRIPE_SECRET_KEY: "sk_test_CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"
  
  # Email Service
  SMTP_HOST: "smtp.example.com"
  SMTP_USER: "noreply@example.com"
  SMTP_PASSWORD: "CHANGE_ME"
