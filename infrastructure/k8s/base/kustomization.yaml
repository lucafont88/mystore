apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce

# Risorse da includere
resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - postgres.yaml
  - redis.yaml
  - rabbitmq.yaml
  - auth-service.yaml
  - product-service.yaml
  - api-gateway.yaml
  - ingress.yaml

# Labels comuni a tutte le risorse
commonLabels:
  app.kubernetes.io/part-of: ecommerce-platform
  app.kubernetes.io/managed-by: kustomize

# Annotations comuni
commonAnnotations:
  app.kubernetes.io/version: "1.0.0"
