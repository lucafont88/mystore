<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="grad4a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fd79a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e17055;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a2e"/>
  
  <!-- Circle mark -->
  <circle cx="180" cy="180" r="72" fill="none" stroke="url(#grad4a)" stroke-width="4"/>
  
  <!-- Z constructed from lines -->
  <line x1="145" y1="145" x2="215" y2="145" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <line x1="215" y1="145" x2="145" y2="215" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <line x1="145" y1="215" x2="215" y2="215" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Small dot at center -->
  <circle cx="180" cy="180" r="4" fill="url(#grad4a)"/>
  
  <!-- ZELKO text -->
  <text x="280" y="186" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="300" fill="#ffffff" letter-spacing="10">ZELKO</text>
  
  <!-- Thin vertical separator -->
  <rect x="280" y="200" width="45" height="2" fill="url(#grad4a)"/>
  
  <!-- MARKET -->
  <text x="280" y="232" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="300" fill="#a29bac" letter-spacing="16">MARKET</text>

  <!-- Tagline area -->
  <line x1="100" y1="310" x2="700" y2="310" stroke="#2d2d4a" stroke-width="1"/>
  <text x="400" y="340" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="300" fill="#636380" letter-spacing="6" text-anchor="middle">YOUR MARKETPLACE</text>
</svg>