<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gradFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fd79a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e17055;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  
  <!-- Circle -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="url(#gradFav)" stroke-width="1.5"/>
  
  <!-- Z simplified -->
  <line x1="10" y1="10" x2="22" y2="10" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="10" x2="10" y2="22" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="10" y1="22" x2="22" y2="22" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
</svg>