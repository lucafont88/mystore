# ============================================================================
# Zelko Market — Kubernetes Deployment (single-file, all-in-one)
# Generato il: 2026-03-09
# Stato progetto: tutti i microservizi attivi
#
# SERVIZI INCLUSI:
#   Infrastruttura:  postgres | db-utenti | redis | rabbitmq | minio
#   Backend:        auth-service | product-service | shop-page-service |
#                   order-service | user-data-service | api-gateway
#   Frontend:       frontend (Vite + nginx)
#
# PRIMA DI APPLICARE:
#   1. Sostituisci <REGISTRY> con il tuo container registry
#      es: ghcr.io/zelkomarket  |  registry.digitalocean.com/zelko
#   2. Sostituisci TUTTI i valori CHANGE_ME con valori reali
#      Genera con: echo -n 'valore' | base64
#      Oppure usa: kubectl create secret generic / Sealed Secrets / Vault
#   3. Imposta storageClassName corretto per il tuo cloud:
#      GKE: standard-rwo  |  EKS: gp3  |  AKS: managed-premium  |  locale: manual
#   4. Aggiorna i domini in Ingress
#
# APPLY:   kubectl apply -f k8s-deploy.yaml
# DELETE:  kubectl delete -f k8s-deploy.yaml
# STATO:   kubectl get all -n zelko
# ============================================================================

# ============================================================================
# NAMESPACE
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: zelko
  labels:
    app.kubernetes.io/part-of: zelko-market

---
# ============================================================================
# SECRETS
# ⚠️  Non committare mai questo file con valori reali in produzione.
#     Usa Sealed Secrets, External Secrets Operator o HashiCorp Vault.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: zelko-secrets
  namespace: zelko
type: Opaque
stringData:
  # ---- Database (postgres condiviso per auth/products/shop_pages/orders) ----
  POSTGRES_USER: "CHANGE_ME"
  POSTGRES_PASSWORD: "CHANGE_ME"

  # ---- Database (db-utenti — separato per user-data-service) ----
  DB_UTENTI_USER: "CHANGE_ME"
  DB_UTENTI_PASSWORD: "CHANGE_ME"

  # ---- Database URLs completi ----
  AUTH_DATABASE_URL: "postgresql://CHANGE_ME:CHANGE_ME@postgres:5432/auth_db?schema=public"
  PRODUCT_DATABASE_URL: "postgresql://CHANGE_ME:CHANGE_ME@postgres:5432/products_db?schema=public"
  SHOP_PAGE_DATABASE_URL: "postgresql://CHANGE_ME:CHANGE_ME@postgres:5432/shop_pages_db?schema=public"
  ORDER_DATABASE_URL: "postgresql://CHANGE_ME:CHANGE_ME@postgres:5432/orders_db?schema=public"
  USER_DATA_DATABASE_URL: "postgresql://CHANGE_ME:CHANGE_ME@db-utenti:5432/user_data_db?schema=public"

  # ---- JWT (genera con: openssl rand -hex 64) ----
  JWT_ACCESS_SECRET: "CHANGE_ME_USE_OPENSSL_RAND_HEX_64"
  JWT_REFRESH_SECRET: "CHANGE_ME_USE_OPENSSL_RAND_HEX_64"

  # ---- RabbitMQ ----
  RABBITMQ_USER: "zelko"
  RABBITMQ_PASSWORD: "CHANGE_ME"
  RABBITMQ_URL: "amqp://zelko:CHANGE_ME@rabbitmq:5672"

  # ---- MinIO ----
  MINIO_ACCESS_KEY: "CHANGE_ME"
  MINIO_SECRET_KEY: "CHANGE_ME"

  # ---- Resend (email OTP) ----
  RESEND_API_KEY: "CHANGE_ME"

  # ---- Stripe ----
  STRIPE_API_KEY: "CHANGE_ME"
  STRIPE_IDENTITY_FLUX_ID: "CHANGE_ME"

  # ---- Swagger UI ----
  SWAGGER_USER: "admin"
  SWAGGER_PASSWORD: "CHANGE_ME"

---
# ============================================================================
# CONFIGMAP — configurazione non sensibile
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: zelko-config
  namespace: zelko
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"

  # Service DNS interni K8s
  AUTH_SERVICE_URL: "http://auth-service:3001"
  PRODUCT_SERVICE_URL: "http://product-service:3002"
  SHOP_PAGE_SERVICE_URL: "http://shop-page-service:3003"
  ORDER_SERVICE_URL: "http://order-service:3004"
  USER_DATA_SERVICE_URL: "http://user-data-service:3005"

  # Redis
  REDIS_URL: "redis://redis:6379"

  # MinIO
  MINIO_ENDPOINT: "minio"
  MINIO_PORT: "9000"
  MINIO_BUCKET_SHOP: "shop-pages"
  MINIO_BUCKET_DIGITAL: "digital-products"

  # Email
  RESEND_FROM: "noreply@zelkomarket.com"

---
# ============================================================================
# CONFIGMAP — script di inizializzazione PostgreSQL
# Crea i DB aggiuntivi al primo avvio (auth_db è creato da POSTGRES_DB)
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: zelko
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    for db in products_db shop_pages_db orders_db; do
      echo "Creating database '$db' if not exists..."
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "postgres" <<-EOSQL
        SELECT 'CREATE DATABASE $db'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$db')\gexec
    EOSQL
    done
    echo "All databases initialized."

---
# ============================================================================
# POSTGRES — database condiviso (auth_db, products_db, shop_pages_db, orders_db)
# ============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: zelko
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "auth_db"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: [pg_isready, -U, postgres, -d, auth_db]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [pg_isready, -U, postgres, -d, auth_db]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init-scripts
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard   # ← cambia per il tuo cloud provider
        resources:
          requests:
            storage: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: zelko
spec:
  type: ClusterIP
  clusterIP: None   # headless per StatefulSet
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres

---
# ============================================================================
# DB-UTENTI — postgres separato per user-data-service (user_data_db)
# ============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-utenti
  namespace: zelko
  labels:
    app: db-utenti
spec:
  serviceName: db-utenti
  replicas: 1
  selector:
    matchLabels:
      app: db-utenti
  template:
    metadata:
      labels:
        app: db-utenti
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: DB_UTENTI_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: DB_UTENTI_PASSWORD
            - name: POSTGRES_DB
              value: "user_data_db"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: db-utenti-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            exec:
              command: [pg_isready, -U, postgres, -d, user_data_db]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [pg_isready, -U, postgres, -d, user_data_db]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: db-utenti-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: db-utenti
  namespace: zelko
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: db-utenti

---
# ============================================================================
# REDIS
# ============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: zelko
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - "allkeys-lru"
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: zelko
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis

---
# ============================================================================
# RABBITMQ
# ============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: zelko
  labels:
    app: rabbitmq
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: RABBITMQ_PASSWORD
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            exec:
              command: [rabbitmq-diagnostics, -q, ping]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: [rabbitmq-diagnostics, -q, ping]
            initialDelaySeconds: 20
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: zelko
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5672
      targetPort: 5672
      name: amqp
    - port: 15672
      targetPort: 15672
      name: management
  selector:
    app: rabbitmq

---
# ============================================================================
# MINIO — object storage (shop HTML + file digitali)
# ============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: zelko
  labels:
    app: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - minio
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: MINIO_SECRET_KEY
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 50Gi

---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: zelko
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 9000
      targetPort: 9000
      name: api
    - port: 9001
      targetPort: 9001
      name: console
  selector:
    app: minio

---
# ============================================================================
# AUTH-SERVICE
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: zelko
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done']
      containers:
        - name: auth-service
          image: <REGISTRY>/zelko/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: zelko-config
                  key: NODE_ENV
            - name: AUTH_SERVICE_PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: AUTH_DATABASE_URL
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: JWT_REFRESH_SECRET
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: zelko-config
                  key: REDIS_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: RABBITMQ_URL
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: RESEND_API_KEY
            - name: RESEND_FROM
              valueFrom:
                configMapKeyRef:
                  name: zelko-config
                  key: RESEND_FROM
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: auth-service
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: zelko
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
  selector:
    app: auth-service

---
