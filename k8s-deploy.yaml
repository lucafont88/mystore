metadata:
  name: api-gateway-hpa
  namespace: zelko
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ============================================================================
# FRONTEND (Vite build servita da nginx)
# Richiede una Docker image con: npm run build + nginx
# Dockerfile consigliato: multi-stage (node → nginx:alpine)
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-frontend-config
  namespace: zelko
data:
  nginx.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      # Gzip
      gzip on;
      gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

      # Cache per asset statici
      location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }

      # SPA fallback — tutte le route tornano a index.html
      location / {
        try_files $uri $uri/ /index.html;
      }

      # Proxy /api → api-gateway
      location /api/ {
        proxy_pass http://api-gateway:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: zelko
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: <REGISTRY>/zelko/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-frontend-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: frontend
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: zelko
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend

---
# ============================================================================
# INGRESS (richiede nginx-ingress-controller)
# kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/
#   controller-v1.9.4/deploy/static/provider/cloud/deploy.yaml
#
# TLS: decommentare la sezione tls e configurare cert-manager per Let's Encrypt
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zelko-ingress
  namespace: zelko
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # tls:
  #   - hosts:
  #       - zelkomarket.com
  #       - www.zelkomarket.com
  #     secretName: zelko-tls
  rules:
    - host: zelkomarket.com   # ← cambia con il tuo dominio
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: www.zelkomarket.com   # ← redirect www → bare domain consigliato
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

