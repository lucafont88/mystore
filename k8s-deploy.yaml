# ============================================================================
# API-GATEWAY (porta 3000 — unico punto d'ingresso per le API)
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: zelko
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-auth
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z auth-service 3001; do echo waiting for auth-service; sleep 2; done']
        - name: wait-for-product
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z product-service 3002; do echo waiting for product-service; sleep 2; done']
      containers:
        - name: api-gateway
          image: <REGISTRY>/zelko/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: zelko-config
                  key: NODE_ENV
            - name: API_GATEWAY_PORT
              value: "3000"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: zelko-config
                  key: AUTH_SERVICE_URL
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: zelko-config
                  key: PRODUCT_SERVICE_URL
            - name: SHOP_PAGE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: zelko-config
                  key: SHOP_PAGE_SERVICE_URL
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: zelko-config
                  key: ORDER_SERVICE_URL
            - name: USER_DATA_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: zelko-config
                  key: USER_DATA_SERVICE_URL
            - name: SWAGGER_USER
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: SWAGGER_USER
            - name: SWAGGER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zelko-secrets
                  key: SWAGGER_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: api-gateway
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
