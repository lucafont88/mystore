services:
  postgres:
    image: postgres:15-alpine
    container_name: mystore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mystore-network

  redis:
    image: redis:7-alpine
    container_name: mystore-redis
    ports:
      - "6379:6379"
    networks:
      - mystore-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mystore-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mystore-network

  minio:
    image: minio/minio:latest
    container_name: mystore-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - mystore-network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "${AUTH_SERVICE_PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - AUTH_SERVICE_PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/auth_db?schema=public
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - mystore-network

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: product-service
    ports:
      - "${PRODUCT_SERVICE_PORT:-3002}:3002"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PRODUCT_SERVICE_PORT=3002
      - PRODUCT_DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/products_db?schema=public
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=digital-products
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
    networks:
      - mystore-network

  shop-page-service:
    build:
      context: .
      dockerfile: services/shop-page-service/Dockerfile
    container_name: shop-page-service
    ports:
      - "${SHOP_PAGE_SERVICE_PORT:-3003}:3003"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SHOP_PAGE_SERVICE_PORT=3003
      - SHOP_PAGE_DATABASE_URL=postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/shop_pages_db?schema=public
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=shop-pages
    depends_on:
      - postgres
      - rabbitmq
      - minio
    networks:
      - mystore-network

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - API_GATEWAY_PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - SHOP_PAGE_SERVICE_URL=http://shop-page-service:3003
      - SWAGGER_USER=${SWAGGER_USER:-admin}
      - SWAGGER_PASSWORD=${SWAGGER_PASSWORD:-admin}
    depends_on:
      - auth-service
      - product-service
      - shop-page-service
    networks:
      - mystore-network

networks:
  mystore-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
